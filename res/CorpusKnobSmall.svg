<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <defs>
    <linearGradient id="knob-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3E38"/>
      <stop offset="100%" stop-color="#2A1E18"/>
    </linearGradient>
    <radialGradient id="knob-shadow" cx="0.5" cy="0.55" r="0.5">
      <stop offset="60%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <circle cx="10" cy="10.7" r="8.5" fill="url(#knob-shadow)"/>
  <!-- Outer ring -->
  <circle cx="10" cy="10" r="9" fill="none" stroke="#B8AA98" stroke-width="0.4"/>
  <!-- Body -->
  <circle cx="10" cy="10" r="8.5" fill="url(#knob-body)"/>
  <!-- Inner recess -->
  <circle cx="10" cy="10" r="7" fill="#352A24"/>
  <!-- Pointer line -->
  <line x1="10" y1="10" x2="10" y2="3.5" stroke="#E8DFD4" stroke-width="1.2" stroke-linecap="round"/>
</svg>
