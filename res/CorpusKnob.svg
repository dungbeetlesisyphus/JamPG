<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
  <defs>
    <linearGradient id="knob-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3E38"/>
      <stop offset="100%" stop-color="#2A1E18"/>
    </linearGradient>
    <radialGradient id="knob-shadow" cx="0.5" cy="0.55" r="0.5">
      <stop offset="60%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <circle cx="14" cy="15" r="12" fill="url(#knob-shadow)"/>
  <!-- Outer ring -->
  <circle cx="14" cy="14" r="12.5" fill="none" stroke="#B8AA98" stroke-width="0.5"/>
  <!-- Body -->
  <circle cx="14" cy="14" r="12" fill="url(#knob-body)"/>
  <!-- Inner recess -->
  <circle cx="14" cy="14" r="10" fill="#352A24"/>
  <!-- Pointer line -->
  <line x1="14" y1="14" x2="14" y2="4" stroke="#E8DFD4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
