name: Build VCV Rack Plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  RACK_SDK_VERSION: "2.6.6"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            rack_arch: lin-x64
            sdk_url_suffix: lin-x64.zip

          - name: macOS x64
            os: macos-13
            rack_arch: mac-x64
            sdk_url_suffix: mac-x64.zip

          - name: macOS ARM64
            os: macos-14
            rack_arch: mac-arm64
            sdk_url_suffix: mac-arm64.zip

          - name: Windows x64
            os: windows-latest
            rack_arch: win-x64
            sdk_url_suffix: win-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rack SDK
        uses: actions/cache@v4
        id: cache-sdk
        with:
          path: Rack-SDK
          key: rack-sdk-${{ env.RACK_SDK_VERSION }}-${{ matrix.rack_arch }}

      - name: Download Rack SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.sdk_url_suffix }}" -o sdk.zip
          unzip -q sdk.zip
          rm sdk.zip

      - name: Build plugin
        env:
          RACK_DIR: Rack-SDK
        run: |
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)

      - name: Create dist package
        env:
          RACK_DIR: Rack-SDK
        run: make dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Corpus-${{ matrix.rack_arch }}
          path: dist/Corpus-*.vcvplugin

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Corpus-*.vcvplugin
          generate_release_notes: true
          draft: false
